interface:
  display_name: "Reading Note"
  short_description: "本やPDFを精読代替ノートへ変換する"
  default_prompt: "Use $reading-note to turn this book, PDF, article, or document into a reader-first 精読代替ノート that starts with what the book helps the reader build or understand, then novice entry questions, a top-level claim, a supporting logic tree with detailed node explanations, claim and concept ledgers, scored self-tests, and a gap audit. Do not put process notes or generation rationale at the top."
